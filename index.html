<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#003082">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kastigo">
<link rel="manifest" href="manifest.json">
<title>Kastigo</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fira Sans', sans-serif;
  }

  .marco {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: #C8102E;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 30px rgba(200,16,46,0.4);
  }

  .inner {
    width: 218px;
    height: 218px;
    border-radius: 50%;
    background: radial-gradient(circle at 42% 38%, #1c6abf, #003082 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
    position: relative;
    overflow: hidden;
  }

  .inner::before {
    content: '';
    position: absolute;
    top: 12px; left: 26px;
    width: 50%; height: 30%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.16), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-bottom: 1px;
    width: 100%;
    text-align: center;
  }

  .numero {
    font-size: 48px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    width: 100%;
    text-align: center;
  }

  .kastigo {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
    width: 100%;
    text-align: center;
  }

  .divider {
    width: 70px;
    height: 1.5px;
    background: rgba(255,255,255,0.22);
    margin: 6px auto;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: #ff4444;
    border-radius: 50%;
    margin: 9px auto 0;
    animation: pulso 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px #ff0000;
  }

  @keyframes pulso {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%       { transform: scale(0.4); opacity: 0.2; }
  }
</style>
</head>
<body>

<div class="marco">
  <div class="inner">
    <div class="label">pasados</div>
    <div class="numero" id="trans">—</div>
    <div class="divider"></div>
    <div class="label">quedan</div>
    <div class="numero" id="rest">—</div>
    <div class="kastigo">días de Kastigo</div>
    <div class="dot"></div>
  </div>
</div>

  if ('serviceWorker' in navigator) {

  }

</script>
</body>
</html>
